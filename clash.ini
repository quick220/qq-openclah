# =============================================
# OpenClash / Clash 订阅转换 INI 模板
# 作者：为你定制
# 功能：一级代理 + 二级自定义跳板
# =============================================

[common]
# 基础设置
dns = true
ipv6 = false
skip-cert-verify = true
udp = true
tfo = false
sort = false

# ====================== 策略组 ======================

[custom_groups]

# ==================== 一级代理（直接选节点） ====================
一级代理 = select, 美国西雅图, 美国西雅图2, 美国洛杉矶[CU], 美国硅谷, 美国硅谷2, 美国圣何塞, 美国洛杉矶, 美国洛杉矶2, 美国ISP, 🇭🇰香港中转[CM], 🇭🇰香港精品4, 🇭🇰香港精品3, 🇭🇰香港精品2, 🇬🇧 英国, 🇫🇷 法国, 🇩🇪 德国, 🇯🇵 日本, 🇯🇵 日本4, 🇸🇬 新加坡, 🇸🇬 新加坡3, 线路少请更换软件看公告

# ==================== 二级代理（自定义跳板） ====================
第一跳 = select, DIRECT, 🇭🇰香港中转[CM], 🇭🇰香港精品4, 🇭🇰香港精品3, 🇭🇰香港精品2, 美国西雅图, 美国洛杉矶[CU], 美国硅谷

第二跳 = select, 美国西雅图, 美国西雅图2, 美国洛杉矶[CU], 美国硅谷, 美国硅谷2, 美国圣何塞, 美国洛杉矶, 美国洛杉矶2, 🇬🇧 英国, 🇫🇷 法国, 🇩🇪 德国, 🇯🇵 日本, 🇯🇵 日本4, 🇸🇬 新加坡, 🇸🇬 新加坡3, 线路少请更换软件看公告

二级代理 = relay, 第一跳, 第二跳

# ==================== 智能分组 ====================
全球智能 = url-test, 美国西雅图, 美国西雅图2, 美国洛杉矶[CU], 美国硅谷, 美国硅谷2, 美国圣何塞, 美国洛杉矶, 美国洛杉矶2, 🇭🇰香港中转[CM], 🇭🇰香港精品4, 🇭🇰香港精品3, 🇭🇰香港精品2, 🇬🇧 英国, 🇫🇷 法国, 🇯🇵 日本4, 🇸🇬 新加坡, 🇸🇬 新加坡3, 线路少请更换软件看公告, url=http://www.gstatic.com/generate_204, interval=7200

香港智能 = url-test, 🇭🇰香港中转[CM], 🇭🇰香港精品4, 🇭🇰香港精品3, 🇭🇰香港精品2, url=http://www.gstatic.com/generate_204, interval=7200

AI专用 = url-test, 美国西雅图, 美国西雅图2, 美国洛杉矶[CU], 美国硅谷, 美国硅谷2, 美国圣何塞, 美国洛杉矶, 美国洛杉矶2, 🇬🇧 英国, 🇫🇣 法国, 🇯🇵 日本, 🇯🇵 日本4, 🇸🇬 新加坡, 🇸🇬 新加坡3, 线路少请更换软件看公告, url=http://www.gstatic.com/generate_204, interval=7200

# 主入口组
Ghelper = select, 一级代理, 二级代理, 全球智能, 香港智能, AI专用, DIRECT

# ====================== 规则设置 ======================
[custom_rules]

# 常用直连
DOMAIN-SUFFIX,ip-api.com,DIRECT
DOMAIN-SUFFIX,ipip.net,DIRECT
DOMAIN-SUFFIX,ip138.com,DIRECT
GEOIP,CN,DIRECT

# 主要规则指向 Ghelper
DOMAIN-KEYWORD,google,Ghelper
DOMAIN-SUFFIX,gmail.com,Ghelper
DOMAIN-SUFFIX,youtube.com,Ghelper
DOMAIN-SUFFIX,instagram.com,Ghelper
DOMAIN-SUFFIX,twitter.com,Ghelper
DOMAIN-SUFFIX,facebook.com,Ghelper
DOMAIN-SUFFIX,telegram.org,Ghelper
DOMAIN-SUFFIX,openai.com,Ghelper
DOMAIN-SUFFIX,chatgpt.com,Ghelper
DOMAIN-SUFFIX,claude.ai,Ghelper
DOMAIN-SUFFIX,anthropic.com,Ghelper
DOMAIN-SUFFIX,microsoft.com,Ghelper
DOMAIN-SUFFIX,bing.com,Ghelper

# 最终兜底
MATCH,Ghelper
