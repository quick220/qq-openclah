[custom]
; =============================================
; 极简版 INI - 国旗筛选 + 英文组名
; =============================================

enable_rule_generator=true
overwrite_original_rules=true

exclude=流量|套餐|到期|剩余|重置|公告|说明|订阅|Expire|Traffic|线路少|冷门

; =============================================
; 策略组
; =============================================

; 一级代理（所有节点）
custom_proxy_group=Proxy`select`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇬🇧 UK`[]🇫🇷 FR`[]🇩🇪 DE`[]🇰🇷 KR`[]🇲🇾 MY`[]🇹🇭 TH`[]🇮🇩 ID`[]🇻🇳 VN`[]🇦🇺 AU`[]🇨🇦 CA

; 第一跳（仅香港）
custom_proxy_group=First Hop`select`[]🇭🇰 HK

; 第二跳（除香港外的所有节点）
custom_proxy_group=Second Hop`select`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇬🇧 UK`[]🇫🇷 FR`[]🇩🇪 DE`[]🇰🇷 KR`[]🇲🇾 MY`[]🇹🇭 TH`[]🇮🇩 ID`[]🇻🇳 VN`[]🇦🇺 AU`[]🇨🇦 CA

; 二级代理（Relay）
custom_proxy_group=Second Level`relay`First Hop`Second Hop

; 智能测速组
custom_proxy_group=Auto`url-test`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🇬🇧 UK`[]🇫🇷 FR`[]🇩🇪 DE`[]🇰🇷 KR`[]🇲🇾 MY`[]🇹🇭 TH`[]🇮🇩 ID`http://www.gstatic.com/generate_204`7200,,100

; 主入口
custom_proxy_group=Ghelper`select`Proxy`Second Level`Auto`DIRECT

; =============================================
; 基础规则
; =============================================

ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

ruleset=Ghelper,[]GEOSITE,gfw
ruleset=Ghelper,DOMAIN-KEYWORD,google
ruleset=Ghelper,DOMAIN-SUFFIX,youtube.com
ruleset=Ghelper,DOMAIN-SUFFIX,openai.com
ruleset=Ghelper,DOMAIN-SUFFIX,chatgpt.com
ruleset=Ghelper,DOMAIN-SUFFIX,claude.ai

ruleset=Ghelper,[]FINAL
