[custom]
; =============================================
; OpenClash 订阅转换模板 - 一级 + 二级跳板版
; 适配你的节点列表 + alpha 核心
; =============================================

enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 节点清洗：剔除机场展示/说明/防失联/流量提示节点
; ==========================================================
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Expire|Official|Website

; ==========================================================
; 3) Default / 漏网之鱼（唯一允许全节点）
;    同时新增：🧊 冷门节点（只收非 HK/JP/TW/US/SG 的节点）
; ==========================================================

; 兜底“手动选择”（不越权应用，只用于 Default/漏网）
; ------------------- 主入口组 -------------------
custom_proxy_group=Ghelper`select`一级代理`二级代理`全球智能`DIRECT
; ------------------- 一级代理 -------------------
custom_proxy_group=一级代理`select`.*
; ------------------- 二级代理（自定义跳板） -------------------
custom_proxy_group=第一跳`select`DIRECT`一级代理
custom_proxy_group=第二跳`select`DIRECT`一级代理
custom_proxy_group=二级代理`relay`第一跳`第二跳
custom_proxy_group=全球智能`url-test`.*`https://www.gstatic.com/generate_204`300,,50
; =============================================
; 基础规则
; =============================================

ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

ruleset=Ghelper,[]GEOSITE,gfw
ruleset=Ghelper,DOMAIN-KEYWORD,google
ruleset=Ghelper,DOMAIN-SUFFIX,youtube.com
ruleset=Ghelper,DOMAIN-SUFFIX,openai.com
ruleset=Ghelper,DOMAIN-SUFFIX,chatgpt.com
ruleset=Ghelper,DOMAIN-SUFFIX,claude.ai

ruleset=Ghelper,[]FINAL

